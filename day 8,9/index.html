<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 8,9 - Mini Game Pack</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black">
  <div class="container">
    <span class="navbar-brand">🎮 Day 8 & 9 Mini Game Pack</span>
  </div>
</nav>

<div class="container my-5">
  <div class="row g-4">

    <div class="col-lg-6">
      <div class="card bg-secondary text-light h-100">
        <div class="card-body">
          <h4 class="card-title">Day 8: Number Guess Game</h4>
          <p class="card-text">Guess the secret number between 1 and 50.</p>

          <div class="input-group mb-3">
            <input id="guessInput" type="number" class="form-control" placeholder="Enter guess (1-50)">
            <button class="btn btn-warning" id="guessBtn">Guess</button>
          </div>

          <h6 id="guessHint" class="mb-2">Start guessing...</h6>
          <p class="mb-2">Attempts: <span id="attempts">0</span></p>
          <button class="btn btn-outline-light btn-sm" id="resetGuessBtn">New Number</button>
        </div>
      </div>
    </div>

    <div class="col-lg-6">
      <div class="card bg-secondary text-light h-100">
        <div class="card-body text-center">
          <h4 class="card-title">Day 9: Rock Paper Scissors</h4>
          <p class="card-text">Pick your move and beat the computer.</p>

          <div class="d-flex flex-wrap justify-content-center gap-2 mb-3">
            <button class="btn btn-primary move-btn" data-move="rock">🪨 Rock</button>
            <button class="btn btn-primary move-btn" data-move="paper">📄 Paper</button>
            <button class="btn btn-primary move-btn" data-move="scissors">✂️ Scissors</button>
          </div>

          <h6 id="rpsResult">Make your move!</h6>
          <p class="mb-1">You: <span id="playerMove">-</span></p>
          <p class="mb-3">Computer: <span id="computerMove">-</span></p>
          <p class="mb-1">Wins: <span id="wins">0</span> | Losses: <span id="losses">0</span> | Draws: <span id="draws">0</span></p>
          <button class="btn btn-outline-light btn-sm mt-2" id="resetRpsBtn">Reset Score</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
